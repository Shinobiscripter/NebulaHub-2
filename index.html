<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NebulaHub V2</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
@font-face {
    font-family: 'Azonix';
    src: url('https://db.onlinewebfonts.com/t/04e1f7fb2b58d60eb24df50a9807fa36.woff2') format('woff2');
}

:root {
    --glass-bg: rgba(20, 20, 20, 0.6);
    --glass-border: #333;
    --accent-main: #fff;
    --font-main: 'Rajdhani', sans-serif;
    --font-header: 'Azonix', 'Orbitron', sans-serif;
    --z-bg: 0;
    --z-snow: 1;
    --z-desktop: 10;
    --z-windows: 500;
    --z-dock: 1000;
    --z-triggers: 2000;
    --z-modal: 3000;
    --z-noti: 8000;
    --z-lock: 90000;
    --z-ciri: 95000;
    --z-boot: 99999;
    --bg-page: #000;
    --bg-window: rgba(15, 15, 15, 0.95);
    --dark-gray: #111;
    --mid-gray: #222;
    --user-gray: #333;
    --text-white: #fff;
    --text-muted: #888;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-drag: none;
    outline: none !important;
    -webkit-tap-highlight-color: transparent !important;
}

::selection { background: #444; color: #fff; }
::-moz-selection { background: #444; color: #fff; }

body {
    background: #000;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: var(--font-main);
    color: white;
}

#mobile-warning {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 999999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}

#mobile-warning.show-warning { display: flex; }

.mobile-box {
    background: #111;
    border: 2px solid #333;
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    max-width: 80%;
    box-shadow: 0 10px 40px rgba(255,255,255,0.05);
}

.mobile-box i { font-size: 3rem; color: #fff; margin-bottom: 15px; }
.mobile-box h2 { font-family: var(--font-header); font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
.mobile-box p { color: #888; font-size: 1rem; font-weight: 600; }

#boot-layer {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: var(--z-boot);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
}

#boot-content { text-align: center; }

.boot-logo {
    font-family: var(--font-header);
    font-size: 3rem;
    color: #fff;
    letter-spacing: 10px;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
}

.boot-sub {
    font-family: var(--font-main);
    color: #888;
    font-size: 1.2rem;
    letter-spacing: 4px;
    margin-bottom: 50px;
    text-transform: uppercase;
}

#boot-btn {
    padding: 15px 50px;
    background: transparent;
    border: 1px solid #555;
    color: #fff;
    font-family: var(--font-header);
    font-size: 18px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.3s;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

#boot-btn:hover { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.4); }

#boot-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;
}

#bg-video, #bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: var(--z-bg);
    opacity: 0.9;
}

#snow-fx {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: var(--z-snow);
}

#lock-screen {
    position: fixed;
    inset: 0;
    z-index: var(--z-lock);
    background: #000;
    display: flex;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.6s cubic-bezier(0.7,0,0.3,1), opacity 0.4s;
}

#lock-screen.active { opacity: 1; pointer-events: all; transform: translateY(0); }
#lock-screen.slide-up { transform: translateY(-100%); opacity: 1; pointer-events: none; }

#lock-video, #lock-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

#lock-ui {
    position: absolute;
    right: 8%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    gap: 30px;
    align-items: center;
}

.lock-line {
    width: 4px;
    background: #fff;
    height: 0;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

#lock-screen.active .lock-line {
    animation: growLine 0.6s cubic-bezier(0.8, 0, 0.2, 1) forwards;
}

.lock-content {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    text-align: right;
    text-shadow: 0 5px 25px rgba(0,0,0,0.9);
}

.l-greet, .l-day-img, .l-date, .l-time {
    opacity: 0;
    transform: translateX(40px);
}

#lock-screen.active .l-greet { animation: slideInText 0.5s forwards 0.3s; }
#lock-screen.active .l-day-img { animation: slideInText 0.5s forwards 0.45s; }
#lock-screen.active .l-date { animation: slideInText 0.5s forwards 0.6s; }
#lock-screen.active .l-time { animation: slideInText 0.5s forwards 0.75s; }

@keyframes growLine {
    0% { height: 0; opacity: 0; }
    100% { height: 250px; opacity: 1; }
}

@keyframes slideInText {
    0% { opacity: 0; transform: translateX(40px); }
    100% { opacity: 1; transform: translateX(0); }
}

.l-greet { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; letter-spacing: 6px; font-weight: 700; color: #ccc; }
.l-day-img { max-height: 200px; margin: 15px 0; object-fit: contain; }
.l-date { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; color: #aaa; }
.l-time { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: #888; }

#hud-top {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
    pointer-events: none;
    text-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.hud-day-img { max-height: 200px; object-fit: contain; opacity: 0.8; }

#right-sidebar {
    position: fixed;
    right: 25px;
    top: 8%;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 50;
}

.sidebar-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar-title {
    font-size: 12px;
    font-weight: 800;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

.sidebar-card {
    background: rgba(15, 15, 15, 0.75);
    backdrop-filter: blur(15px);
    border: 1px solid #333;
    border-radius: 14px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.sidebar-card:hover {
    background: rgba(30, 30, 30, 0.9);
    border-color: #fff;
    transform: translateX(-5px) scale(1.02);
}

.sidebar-info {
    display: flex;
    flex-direction: column;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-info div {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sidebar-info small {
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
}

#last-game-icon, #spotify-album-art {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.play-overlay {
    position: absolute;
    right: 15px;
    color: #fff;
    font-size: 16px;
    opacity: 0;
    transition: 0.3s;
}

.sidebar-card:hover .play-overlay {
    opacity: 1;
    transform: scale(1.2);
}

#fps-counter { position: fixed; bottom: 24px; left: 24px; background: #111; border: 1px solid #333; padding: 6px 12px; border-radius: 8px; font-family: var(--font-main); font-size: 12px; font-weight: bold; color: #fff; z-index: 99999; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.9); }

#dock-container {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    height: 52px;
    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid #333;
    border-radius: 18px;
    z-index: var(--z-dock);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    transition: transform 0.4s;
    padding: 0 15px;
}

.dock-hidden { transform: translate(-50%, 150%) !important; }

.dock-item {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
}

.dock-item:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
.dock-item img { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; }
.dock-sep { width: 1px; height: 24px; background: #555; margin: 0 4px; }

.desktop-app {
    position: absolute;
    width: 80px;
    height: 95px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: var(--z-desktop);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), 
                width 0.3s ease, height 0.3s ease, 
                background 0.3s ease, box-shadow 0.3s ease;
}

.desktop-app:hover { transform: scale(1.05); }

.d-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    pointer-events: none;
    object-fit: contain;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
    transition: all 0.3s;
}

.d-label {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 2px 5px #000, 0 0 2px #000;
    width: 90px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.3s;
}

.name-hidden .d-label { opacity: 0 !important; display: none !important; }

.desktop-app.expanded-folder {
    transform: scale(1) !important;
    background: rgba(15, 15, 15, 0.98);
    border: 1px solid #444;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9);
    cursor: default;
    z-index: 900 !important;
    padding: 15px;
    display: block; 
}

.folder-header {
    font-family: var(--font-main);
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 15px;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.folder-header i { color: #888; transition: 0.2s; cursor: pointer; }
.folder-header i:hover { color: #fff; transform: scale(1.2); }

.folder-grid-expanded {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-height: 250px;
    overflow-y: auto;
}

.folder-grid-expanded::-webkit-scrollbar { width: 4px; }
.folder-grid-expanded::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }

.f-app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.f-app:hover { transform: scale(1.1); }
.f-app img { width: 38px; height: 38px; border-radius: 8px; }
.f-app span { font-size: 11px; color: #ccc; max-width: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;}

.desktop-large-mode .desktop-app { width: 90px; height: 90px; }
.desktop-large-mode .d-icon { width: 70px; height: 70px; }
.desktop-large-mode .d-label { opacity: 0; pointer-events: none; }

.d-folder-grid {
    width: 50px;
    height: 50px;
    background: rgba(20, 20, 20, 0.8);
    border: 1px solid #555;
    border-radius: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
    padding: 4px;
    pointer-events: none;
    backdrop-filter: blur(5px);
}

.desktop-large-mode .d-folder-grid { width: 70px; height: 70px; padding: 6px; gap: 4px; }
.d-folder-grid img { width: 100%; height: 100%; object-fit: contain; border-radius: 4px; }

#drag-proxy { position: fixed; z-index: 9999; pointer-events: none; opacity: 0.8; display: none; width: 50px; height: 50px; }
#drag-proxy img { width: 100%; height: 100%; object-fit: contain; border-radius: 12px; }
#folder-badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; font-weight: bold; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }

.os-menu {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 550px;
    height: 600px;
    background: #111;
    border: 1px solid #333;
    border-radius: 16px;
    z-index: var(--z-modal);
    display: none;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
    flex-direction: column;
    padding: 25px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}

.os-menu.open { display: flex; opacity: 1; transform: translateX(-50%) translateY(0); }
.start-search-bar { width: 100%; padding: 12px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; font-family: var(--font-main); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.start-search-bar input::placeholder { color: #666; }
.pinned-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
.pinned-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; padding: 12px; border-radius: 12px; transition: 0.2s; }
.pinned-item:hover { background: #222; }
.pinned-item img { width: 38px; height: 38px; object-fit: contain; border-radius: 10px; }
.pinned-item span { font-size: 12px; color: #aaa; }
.start-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
.user-profile { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 30px; height: 30px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

#app-drawer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    z-index: var(--z-modal);
    display: none;
    opacity: 0;
    transition: 0.3s ease;
    padding: 80px;
    align-content: flex-start;
}

#app-drawer.open { display: block; opacity: 1; }
.drawer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 30px; max-width: 900px; margin: 0 auto; }
.drawer-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
.drawer-item:hover { transform: scale(1.1); }
.drawer-item img { width: 60px; height: 60px; border-radius: 16px; object-fit: contain; }
.drawer-item span { color: #fff; font-size: 13px; font-weight: 600; }

.window {
    position: fixed;
    inset: 0;
    background: #000;
    border: none;
    display: flex;
    flex-direction: column;
    z-index: var(--z-windows);
    opacity: 0;
    pointer-events: none;
    transform: scale(0.95);
    transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
}

.window.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: var(--z-windows); }
.window.minimized { transform: translateY(100%) scale(0.5); opacity: 0; pointer-events: none; }
.win-header {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 45px;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
}

.header-visible .win-header { transform: translateY(0); }
.win-title { font-family: var(--font-header); font-size: 13px; color: #aaa; letter-spacing: 2px; }
.win-controls { display: flex; gap: 15px; align-items: center; }
.win-btn {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    color: transparent;
}
.win-btn:hover { color: #fff; }
.btn-min { background: #444; border: 1px solid #666; }
.btn-min:hover { background: #888; transform: scale(1.15); }
.btn-min::before { content: ''; width: 8px; height: 2px; background: currentColor; border-radius: 2px; }
.btn-close { background: #555; border: 1px solid #777; }
.btn-close:hover { transform: scale(1.15); box-shadow: 0 0 8px #fff; background: #fff; color: #000; }
.btn-close::before, .btn-close::after { content: ''; position: absolute; width: 8px; height: 2px; background: currentColor; border-radius: 2px; }
.btn-close::before { transform: rotate(45deg); }
.btn-close::after { transform: rotate(-45deg); }
.win-body { width: 100%; height: 100%; overflow: hidden; position: relative; background: #000; }
iframe { width: 100%; height: 100%; border: none; display: block; }

#top-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 20px; z-index: var(--z-triggers); }
#bottom-trigger { position: fixed; bottom: 0; left: 0; width: 100%; height: 30px; z-index: var(--z-triggers); }

.os-context-menu {
    position: fixed;
    display: none;
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 8px;
    min-width: 220px;
    z-index: 99999;
    box-shadow: 0 15px 35px rgba(0,0,0,0.9);
    font-family: var(--font-main);
}
.ctx-item { padding: 10px 15px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; border-radius: 6px; }
.ctx-item i { color: #888; font-size: 16px; transition: 0.2s; width: 20px; text-align: center; }
.ctx-item:hover { background: #222; }
.ctx-item:hover i { color: #fff; }
.ctx-separator { height: 1px; background: #333; margin: 6px 0; }
.ctx-row { display: flex; gap: 8px; padding: 0 4px; }
.ctx-btn { flex: 1; background: #222; border: 1px solid #444; color: #ccc; border-radius: 6px; padding: 8px 0; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
.ctx-btn:hover { background: #fff; color: #000; border-color: #fff; }

#ciri-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: var(--z-ciri); }
#ciri-window {
    position: fixed;
    bottom: 8vh;
    left: 50%;
    transform: translate(-50%, 40px) scale(0.92);
    width: 90%;
    max-width: 740px;
    height: 85vh;
    max-height: 820px;
    background: #111;
    border: 1px solid #333;
    border-radius: 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.2,0.8,0.2,1);
    z-index: calc(var(--z-ciri) + 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    box-sizing: border-box;
    overflow: hidden;
    color: white;
}
body.ciri-active #ciri-backdrop { opacity: 1; pointer-events: all; }
body.ciri-active #ciri-window { opacity: 1; pointer-events: all; transform: translate(-50%, 0) scale(1); }
#ciri-boot-screen { position: absolute; inset: 0; background: #0
