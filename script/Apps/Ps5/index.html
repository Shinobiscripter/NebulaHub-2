<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* (your entire CSS is unchanged, keeping it clean) */
body { margin:0; background:#0a0a0f; color:#fff; font-family:'Rajdhani',sans-serif; }

/* viewer fade */
#game-viewer {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: none;
  flex-direction: column;
  transition: opacity 0.2s ease;
}
#game-viewer.open { display:flex; }

#viewer-bar {
  height:44px;
  background:#111;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

#game-frame { flex:1; border:none; width:100%; }
</style>
</head>

<body>

<!-- minimal UI kept for clarity -->
<div id="game-viewer">
  <div id="viewer-bar">
    <div id="viewer-title">—</div>
    <div>
      <button onclick="toggleFullscreen()">⛶</button>
      <button onclick="closeGame()">✕</button>
    </div>
  </div>
  <iframe id="game-frame"></iframe>
</div>

<script>
const GITHUB_USER = 'Shinobiscripter';
const GITHUB_REPO = 'NebulaHub-2';
const GAMES_PATH = 'Games';

const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GAMES_PATH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GAMES_PATH}`;

let allGames = [];

async function loadGames() {
  const res = await fetch(API_URL);
  const files = await res.json();

  allGames = files
    .filter(f => f.name.endsWith('.html'))
    .map(f => ({
      name: f.name.replace('.html',''),
      url: `${RAW_BASE}/${f.name}`
    }));

  // auto open first game for testing
  if (allGames.length) openGame(allGames[0].url, allGames[0].name);
}

async function openGame(url, name) {
  const viewer = document.getElementById('game-viewer');
  const frame = document.getElementById('game-frame');

  viewer.classList.add('open');
  viewer.style.opacity = "0";
  setTimeout(() => viewer.style.opacity = "1", 50);

  document.getElementById('viewer-title').textContent = name.toUpperCase();

  // loading screen
  frame.srcdoc = `
    <div style="
      color:white;
      font-family:Arial;
      display:flex;
      height:100vh;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:10px;
      background:#000;
    ">
      <div style="font-size:18px;">Loading ${name}...</div>
    </div>
  `;

  try {
    const res = await fetch(url);
    const html = await res.text();

    // FIX RELATIVE PATHS
    const baseTag = `<base href="${url.substring(0, url.lastIndexOf('/') + 1)}">`;

    frame.srcdoc = baseTag + html;

  } catch (err) {
    frame.srcdoc = `
      <div style="color:white;text-align:center;padding:20px;">
        <h2>Failed to load game</h2>
        <p>${err.message}</p>
      </div>
    `;
  }
}

function closeGame() {
  const viewer = document.getElementById('game-viewer');
  const frame = document.getElementById('game-frame');

  viewer.classList.remove('open');
  frame.srcdoc = "";
}

function toggleFullscreen() {
  const frame = document.getElementById('game-frame');
  if (frame.requestFullscreen) frame.requestFullscreen();
}

loadGames();
</script>

</body>
</html>
