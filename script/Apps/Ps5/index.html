<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.06);
  --accent: #fff;
  --accent-blue: #0096ff;
  --accent-glow: rgba(0,150,255,0.15);
  --text: #fff;
  --text-muted: #6b6b80;
  --text-dim: #3a3a50;
  --card-w: 280px;
  --card-h: 158px;
}

* { margin:0; padding:0; box-sizing:border-box; user-select:none; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -20%;
  width: 60%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(0,100,255,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Top Bar */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 40px 0;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

#topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

#back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-muted);
}
#back-btn:hover { background: var(--surface); color: #fff; border-color: rgba(255,255,255,0.15); }
#back-btn svg { width: 16px; height: 16px; }

#page-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}

#topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

#search-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  transition: all 0.2s;
}
#search-wrap:focus-within {
  border-color: rgba(0,150,255,0.4);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(0,150,255,0.08);
}
#search-wrap svg { color: var(--text-muted); flex-shrink: 0; width:14px; height:14px; }
#search {
  background: none; border: none; outline: none;
  color: #fff; font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 600; width: 160px;
}
#search::placeholder { color: var(--text-dim); }

#game-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* Hero section */
#hero {
  padding: 28px 40px 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

#hero-text h1 {
  font-size: 2.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, #888 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#hero-text p {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-top: 6px;
  font-weight: 600;
}

/* Sort tabs */
#sort-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.sort-tab {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.sort-tab.active {
  background: rgba(255,255,255,0.08);
  color: #fff;
}
.sort-tab:hover:not(.active) { color: rgba(255,255,255,0.6); }

/* Divider */
#divider {
  height: 1px;
  background: var(--border);
  margin: 20px 40px;
  flex-shrink: 0;
}

/* Games grid */
#games-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 40px 40px;
  position: relative;
  z-index: 10;
}

#games-scroll::-webkit-scrollbar { width: 4px; }
#games-scroll::-webkit-scrollbar-track { background: transparent; }
#games-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

#games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
  gap: 16px;
}

/* Game card */
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  group: true;
}

.game-card:hover {
  transform: translateY(-4px) scale(1.01);
  border-color: rgba(0,150,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,150,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
}

.game-card:active { transform: translateY(-2px) scale(1.005); }

/* Card thumbnail */
.card-thumb {
  width: 100%;
  height: var(--card-h);
  background: var(--surface2);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-thumb-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  opacity: 0.07;
  font-weight: 900;
  letter-spacing: -4px;
  color: #fff;
  text-transform: uppercase;
  user-select: none;
  overflow: hidden;
}

.card-thumb-icon {
  width: 56px;
  height: 56px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
  transition: all 0.25s;
}

.game-card:hover .card-thumb-icon {
  background: rgba(0,150,255,0.12);
  border-color: rgba(0,150,255,0.3);
  transform: scale(1.1);
}

.card-thumb-icon svg {
  width: 26px; height: 26px;
  color: rgba(255,255,255,0.5);
  transition: color 0.25s;
}

.game-card:hover .card-thumb-icon svg { color: rgba(0,150,255,0.9); }

/* Shimmer line */
.card-thumb::after {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  transition: left 0.5s ease;
}
.game-card:hover .card-thumb::after { left: 140%; }

/* Play overlay */
.play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,150,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.game-card:hover .play-overlay { opacity: 1; }

.play-btn-circle {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(0,150,255,0.9);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(0,150,255,0.5);
}
.play-btn-circle svg { width: 18px; height: 18px; color: #fff; margin-left: 2px; }

/* Card info */
.card-info {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-name {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  letter-spacing: 0.3px;
}

.card-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(0,150,255,0.1);
  border: 1px solid rgba(0,150,255,0.2);
  color: rgba(0,150,255,0.8);
  flex-shrink: 0;
  margin-left: 10px;
}

/* Loading state */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  height: 200px;
  color: var(--text-muted);
}

.load-ring {
  width: 36px; height: 36px;
  border: 2px solid var(--surface2);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loading p { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

/* Empty state */
#empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  height: 200px;
  color: var(--text-muted);
  text-align: center;
}

#empty svg { width: 40px; height: 40px; opacity: 0.3; }
#empty h3 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
#empty p { font-size: 13px; color: var(--text-dim); }

/* Error state */
#error-msg {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  height: 200px;
  color: var(--text-muted);
  text-align: center;
}

/* In-app iframe viewer */
#game-viewer {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: none;
  flex-direction: column;
}

#game-viewer.open { display: flex; }

#viewer-bar {
  height: 44px;
  background: rgba(10,10,15,0.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  backdrop-filter: blur(10px);
}

#viewer-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
}

#viewer-controls { display: flex; gap: 10px; }

.viewer-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-muted);
}
.viewer-btn:hover { background: var(--surface); color: #fff; }
.viewer-btn svg { width: 14px; height: 14px; }

#game-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* Card entrance animation */
.game-card {
  animation: cardIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
* { scrollbar-width: thin; scrollbar-color: var(--surface2) transparent; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div id="topbar-left">
    <div id="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div id="page-title">Game Library</div>
  </div>
  <div id="topbar-right">
    <div id="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search games..." oninput="filterGames(this.value)">
    </div>
    <div id="game-count">— GAMES</div>
  </div>
</div>

<!-- Hero -->
<div id="hero">
  <div id="hero-text">
    <h1>GAME LIBRARY</h1>
    <p>NebulaHub // Play anything, anywhere</p>
  </div>
  <div id="sort-tabs">
    <div class="sort-tab active" onclick="sortGames('name', this)">A — Z</div>
    <div class="sort-tab" onclick="sortGames('recent', this)">Recent</div>
  </div>
</div>

<div id="divider"></div>

<!-- Games scroll area -->
<div id="games-scroll">
  <div id="loading">
    <div class="load-ring"></div>
    <p>Loading Library...</p>
  </div>

  <div id="error-msg">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;opacity:0.3"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
    <h3 style="font-size:15px;font-weight:700;letter-spacing:1px">UNABLE TO LOAD</h3>
    <p style="font-size:12px;color:var(--text-dim)">Could not reach the games repository</p>
  </div>

  <div id="empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/><path d="M12 7v4m-2-2h4"/></svg>
    <h3>NO GAMES FOUND</h3>
    <p>Try a different search</p>
  </div>

  <div id="games-grid"></div>
</div>

<!-- In-app game viewer -->
<div id="game-viewer">
  <div id="viewer-bar">
    <div id="viewer-title">—</div>
    <div id="viewer-controls">
      <div class="viewer-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </div>
      <div class="viewer-btn" onclick="closeGame()" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
  </div>
  <iframe id="game-frame" allowfullscreen></iframe>
</div>

<script>
const GITHUB_USER = 'Shinobiscripter';
const GITHUB_REPO = 'NebulaHub-2';
const GAMES_PATH = 'Games';
const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GAMES_PATH}`;
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GAMES_PATH}`;

let allGames = [];
let currentSort = 'name';

async function loadGames() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('API error');
    const files = await res.json();

    allGames = files
      .filter(f => f.type === 'file' && f.name.endsWith('.html'))
      .map(f => ({
        name: f.name.replace('.html', '').replace(/[-_]/g, ' '),
        file: f.name,
        url: `${RAW_BASE}/${f.name}`,
        sha: f.sha
      }));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('game-count').textContent = allGames.length + ' GAMES';
    renderGames(allGames);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
  }
}

function renderGames(games) {
  const grid = document.getElementById('games-grid');
  const empty = document.getElementById('empty');

  if (games.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';

  // Get initials for bg text
  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 4);
  }

  grid.innerHTML = games.map((g, i) => `
    <div class="game-card" style="animation-delay:${i * 0.04}s" onclick="openGame('${g.url}', '${g.name}')">
      <div class="card-thumb">
        <div class="card-thumb-bg">${getInitials(g.name)}</div>
        <div class="card-thumb-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8m-4-4v4"/>
            <path d="M9 10h6M12 7v6"/>
          </svg>
        </div>
        <div class="play-overlay">
          <div class="play-btn-circle">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-name">${g.name}</div>
        <div class="card-badge">HTML5</div>
      </div>
    </div>
  `).join('');
}

function filterGames(query) {
  const q = query.toLowerCase().trim();
  const filtered = q ? allGames.filter(g => g.name.toLowerCase().includes(q)) : allGames;
  document.getElementById('game-count').textContent = filtered.length + ' GAMES';
  renderGames(filtered);
}

function sortGames(type, el) {
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentSort = type;
  if (type === 'name') {
    allGames.sort((a, b) => a.name.localeCompare(b.name));
  }
  filterGames(document.getElementById('search').value);
}

function openGame(url, name) {
  document.getElementById('game-viewer').classList.add('open');
  document.getElementById('viewer-title').textContent = name.toUpperCase();
  document.getElementById('game-frame').src = url;
}

function closeGame() {
  document.getElementById('game-viewer').classList.remove('open');
  document.getElementById('game-frame').src = '';
}

function toggleFullscreen() {
  const frame = document.getElementById('game-frame');
  if (frame.requestFullscreen) frame.requestFullscreen();
  else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeGame();
});

loadGames();
</script>
</body>
</html>
